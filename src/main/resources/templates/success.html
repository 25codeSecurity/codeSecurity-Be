<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>성공</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f6fa;
            color: #2d3436;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h2 {
            color: #6c5ce7;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            color: #2d3436;
            margin-bottom: 30px;
        }

        a {
            text-decoration: none;
            background-color: #6c5ce7;
            color: white;
            padding: 10px 18px;
            margin: 5px;
            border-radius: 8px;
            font-size: 15px;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #a29bfe;
        }
    </style>

    <script th:inline="javascript">
        /*<![CDATA[*/
        window.onload = function() {
            const message = /*[[${message}]]*/ "기본 메시지";
            if (message) {
                alert(message);
                // 향후: SweetAlert2나 모달로 교체 가능
            }
        };
        /*]]>*/
    </script>
</head>
<body>
<h2>✅ 계약 제출 완료!</h2>
<p th:text="${message}"></p>

<div>
    <a href="/contracts/contract-form">📄 새 계약 작성</a>
    <a href="/contracts/home">🏠 홈으로</a>
</div>
</body>
</html>
