<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>성공</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #6c5ce7;
            border: none;
        }
        .btn-primary:hover {
            background-color: #5649d2;
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card text-center p-5">
                <div class="mb-3">
                    <i class="fas fa-check-circle fa-4x text-success"></i>
                    <h2 class="fw-bold mt-3">계약 제출 완료!</h2>
                </div>

                <p th:text="${message}" class="text-muted mb-4">계약이 성공적으로 처리되었습니다.</p>

                <div class="d-grid gap-2 d-md-flex justify-content-center">
                    <a href="/contracts/contract-form" class="btn btn-primary">새 계약 작성</a>
                    <a href="/contracts/home" class="btn btn-outline-secondary">홈으로 이동</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
