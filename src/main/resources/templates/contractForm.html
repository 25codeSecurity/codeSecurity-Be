<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>코인 선물 계약 요청</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #6c5ce7;
            border: none;
        }
        .btn-primary:hover {
            background-color: #5649d2;
        }
        .form-label {
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-file-signature fa-3x text-primary mb-2"></i>
                    <h2 class="fw-bold">선물 계약 요청</h2>
                    <p class="text-muted">계약 정보를 입력하여 제출하세요.</p>
                </div>

                <form th:action="@{/contracts/submit}" method="post">
                    <div class="mb-3">
                        <label class="form-label">회원 ID</label>
                        <input type="number" class="form-control" name="memberId" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">매치 코드</label>
                        <input type="text" class="form-control" name="matchCode" placeholder="예: 222" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">유형</label>
                        <input type="text" class="form-control" name="type" value="futures_contract" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">포지션</label>
                        <select class="form-select" name="position">
                            <option value="long">LONG</option>
                            <option value="short">SHORT</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">거래 자산</label>
                        <input type="text" class="form-control" name="asset" placeholder="예: BTC" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">수량</label>
                        <input type="number" class="form-control" name="amount" step="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">거래 가격</label>
                        <input type="number" class="form-control" name="strikePrice" step="1" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">만기일</label>
                        <input type="date" class="form-control" name="expiration" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">계약 제출</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
