<!-- Step 3. 계약 체결 화면 -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>계약 체결</title>
</head>
<body>
<h1>🔗 계약 체결</h1>

<form th:action="@{/contracts/match}" method="post">
    <label>계약 ID 1: <input type="number" name="contractId1" required></label><br />
    <label>계약 ID 2: <input type="number" name="contractId2" required></label><br />
    <button type="submit">체결 요청</button>
</form>

<!-- 결과 메시지 -->
<p th:if="${success}" style="color: green;">✅ 계약 체결 성공!</p>
<p th:if="${error}" style="color: red;">❌ 계약 체결 실패: <span th:text="${error}"></span></p>

</body>
</html>
