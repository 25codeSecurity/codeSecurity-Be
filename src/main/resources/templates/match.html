<!-- Step 3. 계약 체결 화면 -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>계약 체결</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #6c5ce7;
            border: none;
        }
        .btn-primary:hover {
            background-color: #5649d2;
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-handshake fa-3x text-primary mb-2"></i>
                    <h2 class="fw-bold">계약 체결</h2>
                    <p class="text-muted">두 개의 계약 ID를 입력하여 체결 요청을 보냅니다.</p>
                </div>

                <form th:action="@{/contracts/match}" method="post">
                    <div class="mb-3">
                        <label for="contractId1" class="form-label">계약 ID 1</label>
                        <input type="number" class="form-control" id="contractId1" name="contractId1" required>
                    </div>
                    <div class="mb-3">
                        <label for="contractId2" class="form-label">계약 ID 2</label>
                        <input type="number" class="form-control" id="contractId2" name="contractId2" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">체결 요청</button>
                    </div>
                </form>

                <div class="mt-4 text-center">
                    <p th:if="${success}" class="text-success fw-bold">✅ 계약 체결 성공!</p>
                    <p th:if="${error}" class="text-danger fw-bold">❌ 계약 체결 실패 <span th:text="${error}"></span></p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
