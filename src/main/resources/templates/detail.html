<!-- Step 5. 계약 상세 조회 화면-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>계약 상세 정보</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .label {
            font-weight: 600;
            color: #6c5ce7;
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-file-alt fa-3x text-primary mb-2"></i>
                    <h2 class="fw-bold">계약 상세 정보</h2>
                    <p class="text-muted">선택한 계약의 내용을 확인하세요.</p>
                </div>

                <ul class="list-group list-group-flush">
                    <li class="list-group-item"><span class="label">계약 ID:</span> <span th:text="${contract.id}"></span></li>
                    <li class="list-group-item"><span class="label">유저:</span> <span th:text="${contract.user}"></span></li>
                    <li class="list-group-item"><span class="label">자산:</span> <span th:text="${contract.asset}"></span></li>
                    <li class="list-group-item"><span class="label">포지션:</span> <span th:text="${contract.position}"></span></li>
                    <li class="list-group-item"><span class="label">수량:</span> <span th:text="${contract.amount}"></span></li>
                    <li class="list-group-item"><span class="label">계약 가격:</span> <span th:text="${contract.strikePrice}"></span></li>
                    <li class="list-group-item"><span class="label">만기일:</span> <span th:text="${contract.expiration}"></span></li>
                    <li class="list-group-item"><span class="label">계약 체결:</span>
                        <span th:text="${contract.matched} ? '✅ 체결됨' : '❌ 미체결'"></span>
                    </li>
                    <li class="list-group-item"><span class="label">정산 완료:</span>
                        <span th:text="${contract.settled} ? '✅ 완료됨' : '❌ 미완료'"></span>
                    </li>
                    <li class="list-group-item"><span class="label">정산 금액:</span>
                        <span th:text="${contract.settlementAmount != null} ? ${contract.settlementAmount} : '미정산'"></span>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

</html>
